# =============================================================================
# Production profile — PostgreSQL on Render
# =============================================================================

# Database — Render injects DATABASE_* when PostgreSQL is linked (see render.yaml)
# Or set SPRING_DATASOURCE_* explicitly with a full JDBC URL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT:5432}/${DATABASE_NAME}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:${DATABASE_USERNAME:}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.pool-name=FinbrainHikariPool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.initialization-fail-timeout=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# H2 console disabled in production
spring.h2.console.enabled=false

# CORS — production frontend URL(s), comma-separated
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:${FRONTEND_URL}}

# JWT secret is required — no default in production
security.jwt.secret=${JWT_SECRET}

# Production logging — no sensitive data, no SQL
logging.level.root=WARN
logging.level.com.example.financetracker=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework.security=WARN

# Startup optimization
spring.main.lazy-initialization=true

# Actuator health for Render probes
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator
