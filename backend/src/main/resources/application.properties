# =============================================================================
# Finbrain — shared configuration (all profiles)
# =============================================================================

spring.application.name=finbrain-api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server — Render injects PORT; no fixed port in production
server.port=${PORT:8081}
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024
server.error.include-message=always
server.error.include-binding-errors=never

# JWT — secret MUST be set in production via JWT_SECRET env var
security.jwt.secret=${JWT_SECRET:}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS — comma-separated origins (no wildcards)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# JPA shared settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Actuator — health endpoint for Render
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true

# Financial Health Score — weights & thresholds
finance.health.weights.budget-adherence=30
finance.health.weights.savings-rate=20
finance.health.weights.emergency-fund=10
finance.health.weights.bill-discipline=10
finance.health.weights.spending-consistency=10
finance.health.weights.goal-progress=10
finance.health.weights.debt-health=5
finance.health.weights.subscription-health=5
finance.health.ratings.excellent-min=80
finance.health.ratings.good-min=65
finance.health.ratings.fair-min=50
finance.health.savings-rate.full-score-percent=30
finance.health.savings-rate.zero-score-percent=0
finance.health.emergency-fund.full-score-months=6
finance.health.emergency-fund.zero-score-months=0
finance.health.spending-consistency.max-cv-percent=40
finance.health.spending-consistency.ideal-cv-percent=10
finance.health.debt.zero-score-dti-percent=40
finance.health.debt.full-score-dti-percent=10
finance.health.subscriptions.high-burden-income-percent=15
finance.health.subscriptions.healthy-burden-income-percent=5
finance.health.decision.min-emergency-months=3
finance.health.decision.buy-confidence-base=70
finance.health.decision.wait-confidence-base=80
finance.health.decision.not-recommended-confidence-base=90
finance.health.prediction.current-month-weight=0.70
finance.health.prediction.historical-weight=0.30
finance.health.prediction.historical-months=6
finance.health.risk.low-max-percent=70
finance.health.risk.medium-max-percent=90
finance.health.risk.high-max-percent=110
finance.health.affordability.remaining-budget-weight=25
finance.health.affordability.emergency-fund-weight=20
finance.health.affordability.upcoming-bills-weight=20
finance.health.affordability.savings-goal-weight=15
finance.health.affordability.overspending-history-weight=10
finance.health.affordability.cash-flow-stability-weight=10
finance.health.affordability.buy-min-score=85
finance.health.affordability.buy-with-caution-min-score=70
finance.health.affordability.wait-min-score=50
finance.health.affordability.target-emergency-months=6
finance.health.affordability.min-emergency-months=3
finance.health.affordability.necessity-bonus=5
finance.health.affordability.luxury-penalty=10
