# =============================================================================
# Development profile — local H2 file database
# =============================================================================

# Local dev server (frontend Vite proxy targets 8081)
server.port=${PORT:8081}

spring.datasource.url=jdbc:h2:file:./data/financedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Dev-only JWT fallback (never use in production)
security.jwt.secret=${JWT_SECRET:dev-only-change-me-use-a-long-random-string-at-least-32-chars}

# Local frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Verbose logging for local debugging
logging.level.root=INFO
logging.level.com.example.financetracker=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

management.endpoint.health.show-details=always
