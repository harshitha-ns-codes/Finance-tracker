# =============================================================================
# Render Blueprint — Finbrain Backend (Neon PostgreSQL)
# Location: render.yaml (repository root)
#
# Database: Neon PostgreSQL (external — set credentials in Render dashboard)
# Deploy:   Render → New Blueprint → select render.yaml
# =============================================================================

services:
  - type: web
    name: finbrain-api
    runtime: docker
    region: Singapore
    plan: free
    branch: main
    autoDeploy: true

    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend

    healthCheckPath: /actuator/health

    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      - key: PORT
        value: 8080

      - key: JWT_SECRET
        generateValue: true

      # Neon PostgreSQL — copy from Neon dashboard (Connection Details → JDBC)
      - key: DATABASE_URL
        sync: false

      - key: DATABASE_USERNAME
        sync: false

      - key: DATABASE_PASSWORD
        sync: false

      # Vercel frontend URL — set after frontend deploy
      - key: FRONTEND_URL
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        sync: false
