name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Clean workspace
        run: ./mvnw clean -B

      - name: Run tests
        run: ./mvnw test -B
        env:
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-chars-long

      - name: Build JAR
        run: ./mvnw package -DskipTests -B
        env:
          SPRING_PROFILES_ACTIVE: dev
          JWT_SECRET: ci-test-jwt-secret-must-be-at-least-32-chars-long

      - name: Verify JAR artifact exists
        run: test -f target/finance-tracker-*.jar

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finbrain-api:ci ./backend

      - name: Verify image size
        run: docker images finbrain-api:ci --format "{{.Size}}"
